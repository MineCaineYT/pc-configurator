<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">PC Configurator | Flagship Build Engine</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        /* ------------------------------------------------------------------
           Tailwind v4 (browser build) defaults dark: to a media query.
           This app toggles a literal `.dark` class on <html>, so we re-point
           the `dark:` variant at that class.
        ------------------------------------------------------------------ */
        @custom-variant dark (&:where(.dark, .dark *));

        /* ===========================================================
           CSS CUSTOM PROPERTIES – LIGHT MODE (default)
        =========================================================== */
        :root {
            --bg-primary: #f4f6f8;
            --bg-secondary: #ffffff;
            --bg-tertiary: #ffffff;
            --bg-elevated: #ffffff;
            --border-color: #e2e8f0;
            --border-color-light: #cbd5e1;
            --text-primary: #1a1a1a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --accent: #7b2ff7;
            --accent-light: #a78bfa;
            --accent-dark: #6d28d9;
            --accent-glow: rgba(123, 47, 247, 0.4);
            --accent-shadow: 0 0 15px rgba(123, 47, 247, 0.4);
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --card-hover-shadow: 0 10px 30px -10px rgba(123, 47, 247, 0.15);
            --button-primary-bg: #1e1e2f;
            --button-primary-text: #ffffff;
            --button-disabled-bg: #e2e8f0;
            --button-disabled-text: #94a3b8;
            --scrollbar-track: #e2e8f0;
            --scrollbar-thumb: #94a3b8;
            --scrollbar-thumb-hover: #7b2ff7;
            --neon-text-shadow: 0 0 8px rgba(123, 47, 247, 0.4);
            --transition-speed: 0.3s;
        }

        /* ===========================================================
           DARK MODE OVERRIDES
        =========================================================== */
        .dark {
            --bg-primary: #09090b;
            --bg-secondary: #18181b;
            --bg-tertiary: #18181b;
            --bg-elevated: #1f1f23;
            --border-color: #27272a;
            --border-color-light: #3f3f46;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --accent: #d946ef;
            --accent-light: #f0abfc;
            --accent-dark: #c026d3;
            --accent-glow: rgba(217, 70, 239, 0.4);
            --accent-shadow: 0 0 15px rgba(217, 70, 239, 0.4);
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.3);
            --card-hover-shadow: 0 10px 30px -10px rgba(168, 85, 247, 0.15);
            --button-primary-bg: #ffffff;
            --button-primary-text: #09090b;
            --button-disabled-bg: #27272a;
            --button-disabled-text: #52525b;
            --scrollbar-track: #18181b;
            --scrollbar-thumb: #3f3f46;
            --scrollbar-thumb-hover: #d946ef;
            --neon-text-shadow: 0 0 8px rgba(217, 70, 239, 0.6);
        }

        /* ===========================================================
           GLOBAL STYLES
        =========================================================== */
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        /* Smooth transition for containers */
        .glass-panel,
        .hardware-card,
        footer,
        header,
        .control-select,
        button {
            transition: background-color var(--transition-speed) ease,
                        color var(--transition-speed) ease,
                        border-color var(--transition-speed) ease,
                        box-shadow var(--transition-speed) ease;
        }

        .glass-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background-color: var(--bg-tertiary);
            border-color: var(--border-color);
        }

        .hardware-card {
            cursor: pointer;
            position: relative;
            overflow: hidden;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }

        .hardware-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid transparent;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            pointer-events: none;
            z-index: 10;
        }

        /* Card hover / selected states (common) */
        .hardware-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-hover-shadow);
        }
        .hardware-card.selected {
            background-color: var(--bg-elevated);
        }
        .hardware-card.selected::before {
            border-color: var(--accent);
            box-shadow: var(--accent-shadow), inset 0 0 10px var(--accent-glow);
        }

        .neon-text {
            text-shadow: var(--neon-text-shadow);
        }

        .matrix-loader {
            display: none;
            background: radial-gradient(circle, rgba(24,24,27,0.95) 0%, rgba(9,9,11,1) 100%);
        }
        .matrix-loader.active { display: flex; }

        .scanline {
            width: 100%;
            height: 4px;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent-light);
            position: absolute;
            top: 0;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: -10%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 110%; opacity: 0; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

        /* Price animation */
        .price-update { animation: flashPrice 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes flashPrice {
            0% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 1; transform: scale(1); }
        }

        .control-select {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .copy-flash { animation: copyFlash 0.5s ease; }
        @keyframes copyFlash {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>

        // --- PERSISTED PREFERENCES (theme + language) ---
        function loadPreferences() {
            try {
                const savedTheme = localStorage.getItem('pcconfig-theme');
                if (savedTheme === 'dark' || savedTheme === 'light') {

        function applyTheme() {

            // Remove both, add current

            try { localStorage.setItem('pcconfig-theme', state.theme); } catch (e) {}
        }

        // --- CORE PRICING LOGIC (unchanged) ---
        function calculateFinalPrice(basePriceUSD, category) {
            const isMemory = (category === 'ram' || category === 'ssd');
            const baseMargin = isMemory ? 1.25 : 1.15;
            let regMargin = regionalModifiers[state.currency];
            if (state.currency === 'RUB' && isMemory) regMargin = rubMemoryModifier;
            const finalUSD = basePriceUSD * baseMargin * regMargin;
            const finalLocal = finalUSD * rates[state.currency];
            return Math.ceil(finalLocal);

            });

            document.getElementById('themeToggle').addEventListener('click', () => {
                state.theme = state.theme === 'dark' ? 'light' : 'dark';
                applyTheme();
            });

            document.getElementById('btnNext').addEventListener('click', () => {
                if (state.currentStepIndex < stepsConfig.length - 1) {
                    state.currentStepIndex++;
                    renderIndicators();
                    renderCurrentStep();
                }
            });

            document.getElementById('btnPrev').addEventListener('click', () => {
                if (state.currentStepIndex > 0) {
                    state.currentStepIndex--;
                    renderIndicators();
                    renderCurrentStep();
                }
            });

            document.getElementById('copyHandleBtn').addEventListener('click', copyHandle);
            document.getElementById('sendTelegramBtn').addEventListener('click', handleSendTelegram);
        }

        function applyStaticTranslations() {
            const d = t();
            document.getElementById('buildCostLabel').innerText = d.ui.buildCost;
            document.getElementById('btnPrev').innerText = d.ui.back;
            document.getElementById('btnNext').innerText = d.ui.next;
            document.getElementById('manifestTitle').innerText = d.ui.manifestTitle;
            document.getElementById('powerLabel').innerText = d.ui.powerLabel;
            document.getElementById('totalLabel').innerText = d.ui.totalLabel;
            document.getElementById('contactTitle').innerText = d.ui.contactTitle;
            document.getElementById('contactText').innerText = d.ui.contactText;
            document.getElementById('contactSuffix').innerText = d.ui.contactSuffix;
            document.getElementById('copyHandleBtn').innerText = d.ui.copy;
            document.getElementById('sendTelegramBtn').innerText = d.ui.send;
        }

        function renderIndicators() {
            const container = document.getElementById('stepIndicators');
            container.innerHTML = '';
            const progress = (state.currentStepIndex / (stepsConfig.length - 1)) * 100;
            document.getElementById('progressLine').style.width = `${progress}%`;

            stepsConfig.forEach((step, idx) => {
                const dot = document.createElement('div');
                const isPast = idx <= state.currentStepIndex;
                const isActive = idx === state.currentStepIndex;

                dot.className = `w-4 h-4 rounded-full border-2 flex items-center justify-center transition-all duration-500 z-10 ${
                    isActive ? 'border-[var(--accent)] bg-[var(--bg-secondary)] shadow-[0_0_10px_var(--accent-glow)] scale-150' :
                    isPast ? 'border-purple-600 bg-purple-600' : 'border-[var(--border-color)] bg-[var(--bg-secondary)]'
                }`;
                container.appendChild(dot);
            });
        }

        function renderCurrentStep() {
            const step = stepsConfig[state.currentStepIndex];
            const meta = t().steps[state.currentStepIndex];
            document.getElementById('stepTitle').innerText = `[0${state.currentStepIndex + 1}] ${meta.title}`;
            document.getElementById('stepDescription').innerText = meta.desc;

            const grid = document.getElementById('hardwareGrid');
            const checkout = document.getElementById('checkoutSection');

            if (step.key === 'checkout') {
                grid.classList.add('hidden');
                checkout.classList.remove('hidden');
                renderCheckout();
                updateNavButtons();
                return;
            }

            grid.classList.remove('hidden');
            checkout.classList.add('hidden');
            grid.innerHTML = '';

            let items = db[step.source];

            if (step.key === 'mobo' && state.selections.cpu) {
                items = items.filter(i => i.socket === state.selections.cpu.socket);
            }
            if (step.key === 'ram' && state.selections.mobo) {
                items = items.filter(i => i.ram === state.selections.mobo.ram);
            }

            const requiredPower = calculateRequiredPower();

            if (step.multi) {
                const types = ['case', 'cooler', 'fan'];
                types.forEach(typ => {
                    const sectionTitle = document.createElement('h3');
                    sectionTitle.className = "col-span-full text-2xl font-orbitron font-bold mt-4 mb-2 text-[var(--text-secondary)] border-b border-[var(--border-color)] pb-2 uppercase";
                    sectionTitle.innerText = t().sections[typ];
                    grid.appendChild(sectionTitle);

                    items.filter(i => i.type === typ).forEach(item => {
                        grid.appendChild(createCard(item, step, requiredPower));
                    });
                });
            } else {
                items.forEach(item => {
                    grid.appendChild(createCard(item, step, requiredPower));
                });
            }

            updateNavButtons();
        }

        function createCard(item, step, requiredPower) {
            const div = document.createElement('div');
            const d = t();

            const isSelected = step.multi
                ? state.selections[step.key].some(i => i.id === item.id)
                : state.selections[step.key]?.id === item.id;

            div.className = `hardware-card p-6 rounded-sm flex flex-col justify-between ${isSelected ? 'selected' : ''}`;

            const finalPrice = calculateFinalPrice(item.price, step.key);
            let lockedHtml = '';
            let isLocked = false;

            if (step.key === 'psu' && item.capacity < requiredPower) {
                isLocked = true;
                div.classList.add('opacity-40', 'pointer-events-none', 'grayscale');
                const lockMsg = d.ui.needsPower.replace('{n}', requiredPower);
                lockedHtml = `<div class="absolute top-4 right-4 bg-red-600 text-white text-xs font-bold px-2 py-1 rounded-sm flex items-center gap-1 shadow-[0_0_10px_rgba(220,38,38,0.6)]">
                    <span>🔒 ${lockMsg}</span>
                </div>`;
            }

            let specsHtml = '';
            if (item.socket) specsHtml += `<span class="bg-[var(--bg-primary)] text-xs px-2 py-1 rounded-sm">${item.socket}</span>`;
            if (item.ram) specsHtml += `<span class="bg-[var(--bg-primary)] text-xs px-2 py-1 rounded-sm">${item.ram}</span>`;
            if (item.tdp) specsHtml += `<span class="bg-[var(--bg-primary)] text-xs px-2 py-1 rounded-sm text-amber-500">${item.tdp}${d.ui.watt} ${d.ui.draw}</span>`;
            if (item.capacity) specsHtml += `<span class="bg-[var(--bg-primary)] text-xs px-2 py-1 rounded-sm text-green-500">${item.capacity}${d.ui.watt} ${d.ui.peak}</span>`;

            div.innerHTML = `
                ${lockedHtml}
                <div>
                    <h3 class="font-bold text-lg mb-2 text-[var(--text-primary)] pr-16">${item.name}</h3>
                    <div class="flex flex-wrap gap-2 mb-4">
                        ${specsHtml}
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-[var(--border-color)] flex justify-between items-end">
                    <div class="text-xs text-[var(--text-muted)] font-bold uppercase tracking-wider">${d.ui.estPrice}</div>
                    <div class="dynamic-price font-orbitron text-xl font-bold text-[var(--accent)]">${formatCurrency(finalPrice)}</div>
                </div>
            `;

            if (!isLocked) {
                div.addEventListener('click', () => {
                    if (step.multi) {
                        const idx = state.selections[step.key].findIndex(i => i.id === item.id);
                        if (idx > -1) state.selections[step.key].splice(idx, 1);
                        else state.selections[step.key].push(item);
                    } else {
                        if (state.selections[step.key]?.id === item.id) {
                            state.selections[step.key] = null;
                        } else {
                            state.selections[step.key] = item;
                        }
                        if (step.key === 'cpu') { state.selections.mobo = null; state.selections.ram = null; state.selections.psu = null; }
                        if (step.key === 'mobo') { state.selections.ram = null; }
                        if (step.key === 'gpu') { state.selections.psu = null; }
                    }
                    renderCurrentStep();
                    updateFooter();
                });
            }

            return div;
        }

        function renderCheckout() {
            const d = t();
            const list = document.getElementById('invoiceList');
            list.innerHTML = '';

            const requiredPower = calculateRequiredPower();
            const rawDraw = calculateRawDraw();
            const actualCapacity = state.selections.psu ? state.selections.psu.capacity : 0;

            document.getElementById('powerSummary').innerText = `${rawDraw}${d.ui.watt} / ${actualCapacity}${d.ui.watt}`;
            const powerEl = document.getElementById('powerSummary');
            if (rawDraw > 0 && actualCapacity < requiredPower) {
                powerEl.classList.remove('text-[var(--accent)]');
                powerEl.classList.add('text-red-500');
            } else {
                powerEl.classList.remove('text-red-500');
                powerEl.classList.add('text-[var(--accent)]');
            }

            stepsConfig.slice(0, 7).forEach((step, idx) => {
                const selection = state.selections[step.key];
                if (!selection || (Array.isArray(selection) && selection.length === 0)) return;
                const stepLabel = d.steps[idx].title;

                const renderInvoiceRow = (item, cat) => {
                    const price = calculateFinalPrice(item.price, cat);
                    return `
                        <div class="flex justify-between items-center bg-[var(--bg-primary)] p-4 rounded-sm border border-[var(--border-color)]">
                            <div>
                                <div class="text-xs text-[var(--text-muted)] font-bold uppercase tracking-wider mb-1">${stepLabel}</div>
                                <div class="font-bold text-[var(--text-primary)] text-lg">${item.name}</div>
                            </div>
                            <div class="font-orbitron text-xl font-bold text-[var(--accent)] dynamic-price">${formatCurrency(price)}</div>
                        </div>
                    `;
                };

                if (Array.isArray(selection)) {
                    selection.forEach(i => list.innerHTML += renderInvoiceRow(i, step.key));
                } else {
                    list.innerHTML += renderInvoiceRow(selection, step.key);
                }
            });

            document.getElementById('checkoutTotal').innerText = formatCurrency(calculateTotal());
        }

        function updateFooter() {
            document.getElementById('footerTotal').innerText = formatCurrency(calculateTotal());
            triggerPriceAnimation();
        }

        function updateNavButtons() {
            const btnNext = document.getElementById('btnNext');
            const btnPrev = document.getElementById('btnPrev');
            const step = stepsConfig[state.currentStepIndex];

            let canProceed = true;
            if (!step.multi && step.key !== 'checkout') {
                canProceed = state.selections[step.key] !== null;
            }

            btnNext.disabled = !canProceed;
            btnPrev.disabled = state.currentStepIndex === 0;

            if (state.currentStepIndex === stepsConfig.length - 1) {
                btnNext.classList.add('hidden');
            } else {
                btnNext.classList.remove('hidden');
            }
        }

        function copyHandle() {
            const d = t();
            const btn = document.getElementById('copyHandleBtn');
            const text = '@minecaine';

            const flashCopied = () => {
                const original = d.ui.copy;
                btn.innerText = d.ui.copied;
                btn.classList.add('copy-flash');
                setTimeout(() => {
                    btn.innerText = original;
                    btn.classList.remove('copy-flash');
                }, 1800);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(flashCopied).catch(() => fallbackCopy(text, flashCopied));
            } else {
                fallbackCopy(text, flashCopied);
            }
        }

        function fallbackCopy(text, onDone) {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand('copy'); } catch (e) {}
            document.body.removeChild(ta);
            onDone();
        }

        function buildManifestText() {
            const d = t();
            let lines = [`PC Configurator — ${d.ui.manifestTitle}`];
            stepsConfig.slice(0, 7).forEach((step, idx) => {
                const selection = state.selections[step.key];
                if (!selection || (Array.isArray(selection) && selection.length === 0)) return;
                const label = d.steps[idx].title;
                if (Array.isArray(selection)) {
                    selection.forEach(i => lines.push(`${label}: ${i.name}`));
                } else {
                    lines.push(`${label}: ${selection.name}`);
                }
            });
            lines.push(`${d.ui.totalLabel}: ${formatCurrency(calculateTotal())}`);
            return lines.join('\n');
        }

        function handleSendTelegram() {
            const d = t();
            const overlay = document.getElementById('loadingOverlay');
            const logBox = document.getElementById('matrixLogs');
            const loadingText = document.getElementById('loadingText');
            const spinner = document.getElementById('loadingSpinner');

            spinner.classList.remove('hidden');
            loadingText.classList.add('text-transparent');
            loadingText.classList.remove('text-green-400');
            loadingText.innerText = d.ui.transmit1;
            logBox.innerHTML = '';
            overlay.classList.add('active');

            const manifestText = buildManifestText();
            const url = `https://t.me/minecaine?text=${encodeURIComponent(manifestText)}`;

            setTimeout(() => {
                loadingText.innerText = d.ui.transmit2;
            }, 700);

            setTimeout(() => {
                window.open(url, '_blank', 'noopener');
                overlay.classList.remove('active');
            }, 1400);
        }

        initApp();
    </script>
</body>
</html>
